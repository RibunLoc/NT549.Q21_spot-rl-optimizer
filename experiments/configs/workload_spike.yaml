# Workload spike scenario configuration

env:
  data_path: "data/processed/price_features_spike.pkl"
  max_steps: 1000
  sla_threshold: 0.95
  spot_capacity: 10
  ondemand_capacity: 5
  workload:
    base_arrival_rate: 2.0
    peak_multiplier: 5.0
    peak_hours: [9, 10, 11, 14, 15, 16]
    avg_job_duration: 10
  cost:
    ondemand_price: 0.096
    sla_penalty: 10.0
    migration_cost: 1.0

agent:
  type: "DQN"
  learning_rate: 0.0001
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 100000
  batch_size: 64
  replay_buffer_size: 100000
  target_update_freq: 1000

training:
  num_episodes: 2000
  max_steps_per_episode: 1000
  log_interval: 20
  save_interval: 100
