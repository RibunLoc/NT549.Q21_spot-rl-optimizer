# Workload spike scenario configuration

seed: 42

env:
  data_path: "data/processed/price_features_spike.pkl"
  max_steps: 1000
  sla_threshold: 0.95
  spot_capacity: 20
  ondemand_capacity: 10
  workload:
    base_arrival_rate: 1.5
    peak_multiplier: 3.0     # spike scenario → peak cao hơn
    avg_job_duration: 5
  cost:
    ondemand_price: 0.096
    sla_penalty: 2.0
    migration_cost: 0.3

agent:
  type: "DQN"
  learning_rate: 0.0003
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 50000
  batch_size: 128
  replay_buffer_size: 100000
  target_update_freq: 500

training:
  num_episodes: 3000
  max_steps_per_episode: 500
  log_interval: 10
  save_interval: 100
