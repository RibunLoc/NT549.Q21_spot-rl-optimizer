# Multi-pool workload spike scenario
# Sudden bursts of jobs, agent must scale up/down rapidly

seed: 42

env:
  type: "multi_pool"
  data_path: "data/processed/multipool_spike.pkl"
  max_steps: 168
  sla_threshold: 0.95
  workload:
    base_arrival_rate: 3.0
    peak_multiplier: 5.0
    avg_job_duration: 3
    spike_probability: 0.05
    spike_multiplier: 4.0
  reward:
    sla_penalty: 10.0
    interrupt_penalty: 0.5
    migration_penalty: 1.0
    concentration_penalty: 0.2
    concentration_threshold: 0.8

agent:
  type: "DQN"
  hidden_dims: [512, 256, 128]
  learning_rate: 0.0003
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 80000
  batch_size: 128
  replay_buffer_size: 200000
  target_update_freq: 500

training:
  num_episodes: 3000
  max_steps_per_episode: 168
  log_interval: 10
  save_interval: 100
  eval_interval: 100
  eval_episodes: 10
