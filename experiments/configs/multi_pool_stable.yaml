# Multi-pool stable price scenario
# 5 types × 3 AZs, low volatility, steady workload

seed: 42

env:
  type: "multi_pool"
  data_path: "data/processed/multipool_stable.pkl"
  max_steps: 168  # 1 week hourly
  sla_threshold: 0.95
  workload:
    base_arrival_rate: 15.0       # steady ~45 running jobs = ~11 instances (avg 4 vCPU)
    peak_multiplier: 2.0          # peak ~90 jobs = ~22 instances (above cap → SLA pressure)
    avg_job_duration: 3
  reward:
    sla_penalty: 10.0
    interrupt_penalty: 0.5
    migration_penalty: 1.0
    concentration_penalty: 0.2
    concentration_threshold: 0.8

agent:
  type: "DQN"
  hidden_dims: [512, 256, 128]
  learning_rate: 0.0001
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.02
  epsilon_decay: 80000
  batch_size: 128
  replay_buffer_size: 200000
  target_update_freq: 1000

training:
  num_episodes: 4000         # tăng từ 3000 → 4000: reward mới phức tạp hơn, cần học lâu hơn
  max_steps_per_episode: 168
  log_interval: 10
  save_interval: 100
  eval_interval: 100
  eval_episodes: 10
