# Quick test DQN configuration (uses raw CSV data)

env:
  data_path: "data/raw/spot_prices/spot_prices_ap-southeast-1_stable.csv"
  max_steps: 200
  sla_threshold: 0.95
  spot_capacity: 10
  ondemand_capacity: 5
  workload:
    base_arrival_rate: 2.0
    peak_multiplier: 3.0
    peak_hours: [9, 10, 11, 14, 15, 16]
    avg_job_duration: 10
  cost:
    ondemand_price: 0.096
    sla_penalty: 10.0
    migration_cost: 1.0

agent:
  type: "DQN"
  learning_rate: 0.0001
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 10000  # Faster decay for quick test
  batch_size: 64
  replay_buffer_size: 50000
  target_update_freq: 500

training:
  num_episodes: 100  # Quick test with 100 episodes
  max_steps_per_episode: 200
  log_interval: 10
  save_interval: 50
