env:
  data_path: "data/raw/spot_prices/spot_prices_ap-southeast-1_stable.csv"
  max_steps: 200
  sla_threshold: 0.95
  spot_capacity: 10
  ondemand_capacity: 5
  workload:
    base_arrival_rate: 2.0
    peak_multiplier: 3.0
    peak_hours: [9, 10, 11, 14, 15, 16]
    avg_job_duration: 10
  cost:
    ondemand_price: 0.096
    sla_penalty: 10.0
    migration_cost: 1.0

agent:
  learning_rate: 0.001
  gamma: 0.99
  epsilon_decay: 10000
  batch_size: 64

training: 
  num_episodes: 50
  max_steps_per_episode: 200
  log_interval: 5
